  <div class="container">
    <h1>Get in Touch</h1>
    <p>This is a static demo form (no backend attached) &mdash; useful for showing form styling and layout inside a containerized site.</p>

    <form class="contact-form" onsubmit="event.preventDefault(); alert('This is a static demo form — no data is sent.');">
      <div>
        <label for="name">Name</label><br>
        <input type="text" id="name" name="name" placeholder="Your name" required>
      </div>
      <div>
        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div>
        <label for="message">Message</label><br>
        <textarea id="message" name="message" rows="5" placeholder="Your message"></textarea>
      </div>
      <button type="submit">Send Message</button>
    </form>
  </div>

  <footer>
    Task 4: Web Server using Docker &mdash; Om Prakash Majhi
  </footer>
